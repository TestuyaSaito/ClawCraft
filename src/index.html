<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SCV Agent Animation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:'Consolas','Courier New',monospace;color:#7ab8ff;user-select:none}
#game-canvas{position:fixed;top:44px;left:0;cursor:none}
#top-bar{position:fixed;top:0;left:0;width:100%;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:linear-gradient(180deg,rgba(0,20,60,.95),rgba(0,10,30,.85));border-bottom:1px solid #1a3a6a;z-index:20}
#top-bar .title{color:#4a9eff;font-size:14px;font-weight:bold;text-shadow:0 0 8px rgba(74,158,255,.4);letter-spacing:1px}
.btn{background:linear-gradient(180deg,#1a3a6a,#0d1f3c);border:1px solid #2a5a9a;color:#7ab8ff;padding:3px 8px;font-size:10px;font-family:inherit;cursor:pointer;transition:all .15s;border-radius:2px;white-space:nowrap}
.btn:hover{background:linear-gradient(180deg,#2a5a9a,#1a3a6a);color:#aad4ff;border-color:#4a8adf}
.btn:active{transform:scale(.96)}
#controls{display:flex;gap:4px;align-items:center;flex-wrap:nowrap}
.ctrl-input,.ctrl-select{height:24px;background:rgba(4,16,34,.92);border:1px solid #21497d;color:#b8dcff;padding:0 6px;font-size:10px;font-family:inherit;border-radius:2px;outline:none}
.ctrl-input{width:220px}
.ctrl-select{min-width:80px}
.info{font-size:11px;color:#5a8abf}
#left-panel{display:none}
.layer-copy,.layer-chip,.engine-item{display:none}
#side-panel{position:fixed;right:0;top:44px;width:260px;height:40%;background:rgba(0,12,30,.92);border-left:1px solid #1a3a6a;z-index:15;overflow-y:auto;padding:10px;font-size:11px}
.panel-title{color:#4a9eff;font-weight:bold;font-size:12px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #1a2a4a}
.agent-card{background:rgba(20,40,80,.5);border:1px solid #1a3a6a;border-radius:3px;padding:8px;margin-bottom:6px;cursor:pointer;transition:all .2s}
.agent-card:hover{border-color:#3a6aaa}
.agent-card.building{border-color:#f0a030;box-shadow:0 0 6px rgba(240,160,48,.15)}
.agent-card.done{border-color:#30d060;box-shadow:0 0 6px rgba(48,208,96,.15)}
.agent-card.failed{border-color:#c74444;box-shadow:0 0 6px rgba(199,68,68,.22)}
.agent-card.session{border-color:#4a9eff;box-shadow:0 0 10px rgba(74,158,255,.18)}
.agent-card.selected{border-color:#00ff00;box-shadow:0 0 8px rgba(0,255,0,.3)}
.agent-card .card-top{display:flex;justify-content:space-between;align-items:center}
.agent-card .aname{color:#4a9eff;font-weight:bold;font-size:11px}
.agent-badge{display:inline-block;margin-left:6px;padding:1px 4px;border:1px solid rgba(74,158,255,.45);border-radius:999px;color:#d8ebff;font-size:8px;letter-spacing:.08em;background:rgba(74,158,255,.14);vertical-align:middle}
.agent-card .abtn-remove{background:none;border:none;color:#664444;font-size:11px;cursor:pointer;padding:0 2px;line-height:1;transition:color .15s}
.agent-card .abtn-remove:hover{color:#ff4444}
.agent-card .astatus{color:#888;font-size:10px;margin-top:2px}
.agent-card .abldg,.agent-card .aengine,.agent-card .atask{color:#666;font-size:9px;margin-top:2px;line-height:1.3}
.pbar{height:3px;background:#0a1a30;border-radius:2px;margin-top:5px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#f0a030,#ffcc00);border-radius:2px;transition:width .3s;width:0}
.pfill.complete{background:linear-gradient(90deg,#30d060,#60ff90)}
#minimap{position:fixed;left:10px;bottom:10px;width:160px;height:100px;background:rgba(0,12,20,.8);border:1px solid #1a3a6a;border-radius:3px;z-index:15}
#fps-counter{position:fixed;left:10px;top:50px;color:#3a5a3a;font-size:9px;z-index:15}
#task-drawer{position:fixed;right:0;top:calc(44px + 40%);width:260px;height:calc(60% - 44px);background:rgba(2,12,28,.98);border-left:1px solid #1a3a6a;border-top:1px solid #1d4e82;z-index:20;display:block;overflow:hidden;pointer-events:auto}
#task-drawer .drawer-head{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:linear-gradient(180deg,rgba(16,38,74,.98),rgba(8,22,46,.95));border-bottom:1px solid #1a3a6a}
#task-drawer .drawer-title{font-size:11px;color:#b9dcff;font-weight:bold}
#task-drawer .drawer-close{display:none}
#task-drawer .drawer-body{height:calc(100% - 36px);padding:8px 10px;overflow-y:auto;font-size:10px}
#agent-prompt-box{display:flex;gap:4px;margin-top:8px;padding-top:8px;border-top:1px solid #1a3a6a;position:relative;z-index:25}
#agent-prompt-input{flex:1;height:26px;background:rgba(4,16,34,.92);border:1px solid #21497d;color:#b8dcff;padding:0 8px;font-size:10px;font-family:inherit;border-radius:2px;outline:none;cursor:text;pointer-events:auto}
#agent-prompt-send{background:linear-gradient(180deg,#1a3a6a,#0d1f3c);border:1px solid #2a5a9a;color:#7ab8ff;padding:4px 10px;font-size:10px;font-family:inherit;cursor:pointer;border-radius:2px;pointer-events:auto}
#agent-prompt-send:hover{background:linear-gradient(180deg,#2a5a9a,#1a3a6a);color:#aad4ff}
#nick-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;display:none;align-items:center;justify-content:center}
#nick-modal.open{display:flex}
#nick-modal .modal-box{background:rgba(6,16,36,.96);border:1px solid #2a5a9a;border-radius:4px;padding:16px;min-width:260px}
#nick-modal .modal-box h3{color:#b9dcff;font-size:12px;margin-bottom:10px}
#nick-modal .modal-box input{width:100%;height:28px;background:rgba(4,16,34,.92);border:1px solid #21497d;color:#b8dcff;padding:0 8px;font-size:11px;font-family:inherit;border-radius:2px;outline:none;margin-bottom:10px}
#nick-modal .modal-btns{display:flex;gap:6px;justify-content:flex-end}
.drawer-meta{display:grid;grid-template-columns:92px 1fr;gap:6px 10px;font-size:10px;margin-bottom:10px}
.drawer-meta dt{color:#5c84b5}
.drawer-meta dd{color:#c2ddff}
.drawer-section{margin-bottom:12px}
.drawer-section h4{font-size:10px;color:#78aef0;margin-bottom:4px}
.drawer-section pre{background:rgba(4,16,36,.9);border:1px solid #15365c;border-radius:3px;padding:8px;color:#c7e0ff;font-size:10px;line-height:1.45;white-space:pre-wrap;word-break:break-word;max-height:74px;overflow:auto}
/* ═══ Report Panel ═══ */
#report-panel{position:fixed;left:10px;bottom:120px;width:300px;max-height:400px;background:rgba(255,255,255,.96);border:1px solid #bbb;border-radius:5px;z-index:18;font-family:'Consolas','Courier New',monospace;color:#222;display:flex;flex-direction:column;box-shadow:0 2px 12px rgba(0,0,0,.25);transition:max-height .3s}
#report-panel.collapsed{max-height:30px;overflow:hidden}
#report-panel .rp-head{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:linear-gradient(180deg,#f4f4f4,#e8e8e8);border-bottom:1px solid #ccc;border-radius:5px 5px 0 0;cursor:pointer;min-height:30px;flex-shrink:0}
#report-panel.collapsed .rp-head{border-radius:5px;border-bottom:none}
#report-panel .rp-title{font-size:12px;font-weight:bold;color:#333;display:flex;align-items:center;gap:6px}
#report-panel .rp-badge{display:inline-block;background:#e53935;color:#fff;font-size:9px;font-weight:bold;padding:1px 5px;border-radius:8px;line-height:1.3}
#report-panel .rp-minimize{background:none;border:none;color:#888;font-size:14px;cursor:pointer;line-height:1;padding:0 2px}
#report-panel .rp-minimize:hover{color:#333}
#report-panel .rp-body{overflow-y:auto;max-height:366px;padding:0}
.rp-item{border-bottom:1px solid #ddd;padding:8px 10px;cursor:pointer;transition:background .15s}
.rp-item:hover{background:#f0f0f0}
.rp-item:last-child{border-bottom:none}
.rp-item-head{display:flex;gap:8px;align-items:flex-start}
.rp-item-sender{flex-shrink:0;min-width:60px}
.rp-item-sender .rp-nick{font-size:10px;font-weight:bold;color:#1a237e}
.rp-item-sender .rp-time{font-size:8px;color:#888;margin-top:1px}
.rp-item-title{flex:1;font-size:10px;color:#333;line-height:1.4;word-break:break-word}
.rp-item-title.unread{font-weight:bold;color:#111}
.rp-item-content{display:none;margin-top:6px;padding:6px 8px;background:#f7f7f7;border:1px solid #e0e0e0;border-radius:3px;font-size:10px;color:#444;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.rp-item.expanded .rp-item-content{display:block}
</style>
</head>
<body>
<div id="top-bar">
  <span class="title">⚙ SCV AGENT MONITOR</span>
  <div id="controls">
    <button class="btn" id="btn-folder" title="프로젝트 폴더 지정">📂</button>
    <span class="info" id="project-path" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;color:#6a9acc" title="클릭하여 변경">(폴더 미지정)</span>
    <select class="ctrl-select" id="agent-engine">
      <option value="codex">Codex</option>
      <option value="claude">Claude</option>
      <option value="gemini">Gemini</option>
    </select>
    <input class="ctrl-input" id="task-prompt" placeholder="Enter task prompt..." />
    <select class="ctrl-select" id="collab-mode">
      <option value="solo">Solo</option>
      <option value="shared-brief">Shared Brief</option>
      <option value="relay">Relay</option>
      <option value="collaborate">Collaborate</option>
      <option value="leader-loop">Leader Loop ♾</option>
    </select>
    <input class="ctrl-input" id="api-key-input" style="width:140px" placeholder="Gemini API Key" type="password" />
    <button class="btn" id="btn-spawn">+ Agent</button>
    <button class="btn" id="btn-start">▶ Start</button>
    <button class="btn" id="btn-reset">↺ Reset</button>
    <button class="btn" id="btn-music">♪ Music</button>
    <span class="info" id="agent-count">Agents: 0</span>
    <span class="info" id="live-status" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block"></span>
  </div>
</div>
<canvas id="game-canvas"></canvas>
<div id="left-panel">
  <div class="panel-title">Operations</div>
  <div class="layer-copy" id="layer-copy">Browser mode: mock tasks only.</div>
  <div id="engine-status-list"></div>
</div>
<div id="side-panel">
  <div class="panel-title">Agent List</div>
  <div id="agent-list"></div>
</div>
<canvas id="minimap"></canvas>
<div id="fps-counter"></div>
<aside id="task-drawer">
  <div class="drawer-head">
    <div class="drawer-title" id="drawer-title">Task Detail</div>
  </div>
  <div class="drawer-body">
    <dl class="drawer-meta">
      <dt>Engine</dt><dd id="drawer-engine">-</dd>
      <dt>Status</dt><dd id="drawer-phase">-</dd>
      <dt>Task</dt><dd id="drawer-task">-</dd>
      <dt>Workspace</dt><dd id="drawer-workspace">-</dd>
      <dt>Branch</dt><dd id="drawer-branch">-</dd>
      <dt>Files</dt><dd id="drawer-files-meta">-</dd>
    </dl>
    <div id="agent-prompt-box">
      <input id="agent-prompt-input" placeholder="Send task to this agent..." />
      <button id="agent-prompt-send">Send</button>
    </div>
    <div class="drawer-section">
      <h4>Prompt</h4>
      <pre id="drawer-prompt">(No task selected)</pre>
    </div>
    <div class="drawer-section">
      <h4>Summary</h4>
      <pre id="drawer-summary">(None yet)</pre>
    </div>
    <div class="drawer-section">
      <h4>Run Log</h4>
      <pre id="drawer-logs">(None yet)</pre>
    </div>
    <div class="drawer-section">
      <h4>Diff</h4>
      <pre id="drawer-diff" style="max-height:120px">(Shown after task completes)</pre>
      <button id="drawer-load-diff" class="btn" style="margin-top:4px;padding:3px 8px;font-size:9px">Load Diff</button>
    </div>
  </div>
</aside>
<div id="inline-chat" style="display:none;position:fixed;z-index:25;background:rgba(0,8,20,0.9);border:1px solid #2a5a9a;border-radius:4px;padding:4px 6px">
  <div style="display:flex;gap:4px;align-items:center">
    <span id="inline-chat-name" style="color:#4a9eff;font-size:9px;font-weight:bold;white-space:nowrap"></span>
    <input id="inline-chat-input" style="width:220px;height:20px;background:rgba(4,16,34,.95);border:1px solid #21497d;color:#b8dcff;padding:0 6px;font-size:10px;font-family:inherit;border-radius:2px;outline:none" placeholder="메시지 입력..." />
    <button id="inline-chat-send" class="btn" style="padding:2px 8px;font-size:9px;height:20px">전송</button>
    <button id="inline-chat-close" style="background:none;border:none;color:#666;font-size:12px;cursor:pointer;line-height:1">×</button>
  </div>
</div>

<div id="report-panel">
  <div class="rp-head" onclick="toggleReportPanel()">
    <div class="rp-title">Report <span id="rp-badge" class="rp-badge" style="display:none">N</span></div>
    <button class="rp-minimize" onclick="event.stopPropagation();toggleReportPanel()">−</button>
  </div>
  <div class="rp-body" id="rp-body"></div>
</div>

<div id="nick-modal">
  <div class="modal-box">
    <h3>Enter nickname</h3>
    <input id="nick-modal-input" placeholder="Nickname..." />
    <div class="modal-btns">
      <button class="btn" id="nick-modal-cancel">Cancel</button>
      <button class="btn" id="nick-modal-ok">OK</button>
    </div>
  </div>
</div>

<script src="audio.js"></script>
<script src="perception.js"></script>
<script src="ui-panels.js"></script>
<script src="live-state.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// SCV AGENT ANIMATION — Canvas Game Engine (core rendering + Agent class)
// ═══════════════════════════════════════════════════════════════

const MOVE_SPEED=165,PATROL_SPEED=75,MINING_SPEED=132,BUILD_SPEED=0.06,TILE=32;
const MINING_ACCEL=2.7; // 3x slower accel/decel for mining trips
const MINING_PAUSE=6; // seconds to mine at mineral
const MAP_IMG_W=2272,MAP_IMG_H=1420;
const BLDG_TYPES=[
  {id:'command_center',name:'Command Center',w:127,h:103,color:'#8a5a4a',colorR:138,colorG:90,colorB:74},
];
// === SCV Sprite Atlas ===
const SCV_CELL=42,SCV_ROW_H=49,SCV_SCALE=1.0;
const SCV_DIR16=[
  [4,false],[5,false],[6,false],[7,false],[8,false],
  [7,true],[6,true],[5,true],[4,true],[3,true],
  [2,true],[1,true],[0,false],[1,false],[2,false],[3,false]
];
const SCV_TURN_RATE=55;
const SCV_ACCEL=8;
const SCV_DECEL_DIST=30;
let scvImg=null;
// Command Center construction stages (row 1 of buildings.png)
const CC_STAGES=[
  {x:11,  w:62,  y:7},  // stage 1: foundation
  {x:119, w:61,  y:7},  // stage 2
  {x:224, w:108, y:7},  // stage 3
  {x:347, w:121, y:7},  // stage 4
  {x:481, w:127, y:7},  // stage 5 (불 꺼짐)
  {x:610, w:127, y:10}, // stage 6 (불 켜짐)
];
const CC_H=103;
// Barracks (row 2, kept for reference)
const BARR_STAGES=[
  {x:16,  w:59},{x:124,w:60},{x:228,w:108},{x:370,w:115},{x:502,w:124},{x:644,w:124},
];
const BARR_Y=135,BARR_H=111;
// CC flicker: off(4) 1 frame + on(5) 1~4 frames random
// Generate flicker sequence dynamically per agent
function genCCFlicker(){
  const seq=[];
  for(let i=0;i<20;i++){
    seq.push(4); // 꺼짐 1프레임
    const onCount=1+Math.floor(Math.random()*4); // 켜짐 1~4프레임
    for(let j=0;j<onCount;j++)seq.push(5);
  }
  return seq;
}
let mineralImg=null;
let bldgImg=null;
const canvas=document.getElementById('game-canvas');
const ctx=canvas.getContext('2d');
const miniCanvas=document.getElementById('minimap');
const miniCtx=miniCanvas.getContext('2d');
let W,H,WORLD_W=1200,WORLD_H=750,cam={x:0,y:0},keys={},mouse={down:false,px:0,py:0,button:-1};
let agents=[],nextId=1,time=0,lastT=0,dt=0;

// ═══════════════════════════════════════════════════════════════
// SC1 SELECTION & COMMAND STATE
// ═══════════════════════════════════════════════════════════════
let selectedAgents=new Set();
let dragBox=null;
let moveMarkers=[];
let mouseScreenX=0,mouseScreenY=0;
let cursorOnCanvas=false;
const MANUAL_IDLE_TIME=5;

function resize(){W=window.innerWidth-260;H=window.innerHeight-44;canvas.width=W;canvas.height=H;WORLD_W=W;WORLD_H=H;miniCanvas.width=160;miniCanvas.height=100;}
window.addEventListener('resize',resize);resize();

// ═══════════════════════════════════════════════════════════════
// DRAWING
// ═══════════════════════════════════════════════════════════════
function rr(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.fill();
}
function rrs(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.stroke();
}
function label(x,y,t,c,sz){
  ctx.font=(sz||10)+'px Consolas,monospace';ctx.textAlign='center';
  ctx.strokeStyle='#000';ctx.lineWidth=2.5;ctx.strokeText(t,x,y);
  ctx.fillStyle=c;ctx.fillText(t,x,y);
}

// Load sprite images
let mapImg=null,cursorImg=null,hoverCursorImg=null,arrowCursorImg=null,gasImg=null,waterMaskImg=null;
let moveMarkerImgs=[null,null,null]; // small, medium, large
// Vespene gas animation: 8 frames, 28px cells
const GAS_FRAMES=8,GAS_CELL=28,GAS_H=34,GAS_FPS=8,GAS_SCALE=1.75,GAS_CYCLE_PAUSE=2;
// Geyser position as fraction of map image, each with independent animation
const GEYSER_POS=[
  {mx:0.4,my:0.69,frame:0,ft:0,paused:false,pt:0},
  {mx:0.44,my:0.68,frame:0,ft:0,paused:true,pt:GAS_CYCLE_PAUSE-0.8},
];
function loadScvSprite(){
  scvImg=new Image(); scvImg.src='./assets/scv_shadow_atlas.png';
  mapImg=new Image(); mapImg.src='./assets/map.png';
  bldgImg=new Image(); bldgImg.src='./assets/buildings.png';
  cursorImg=new Image(); cursorImg.src='./assets/sc_cursor_webp_0.png';
  hoverCursorImg=new Image(); hoverCursorImg.src='./assets/sc_cursor_green_circle_spritesheet.png';
  arrowCursorImg=new Image(); arrowCursorImg.src='./assets/sc1_green_arrow_spritesheet.png';
  gasImg=new Image(); gasImg.src='./assets/vespene_gas.png';
  waterMaskImg=new Image(); waterMaskImg.src='./assets/water_mask.png';
  mineralImg=new Image(); mineralImg.src='./assets/mineral_sc1_v2.png';
  moveMarkerImgs[0]=new Image(); moveMarkerImgs[0].src='./assets/sc1_move_marker_small.png';
  moveMarkerImgs[1]=new Image(); moveMarkerImgs[1].src='./assets/sc1_move_marker_medium.png';
  moveMarkerImgs[2]=new Image(); moveMarkerImgs[2].src='./assets/sc1_move_marker_large.png';
}

function drawScvSprite(cx,cy,dir16,frame){
  if(!scvImg||!scvImg.complete||!scvImg.naturalWidth) return;
  const di=((Math.round(dir16)%16)+16)%16;
  const [col,flip]=SCV_DIR16[di];
  const sx=col*SCV_CELL;
  const dw=SCV_CELL*SCV_SCALE;
  const dh=SCV_ROW_H*SCV_SCALE;
  const px=Math.round(cx),py=Math.round(cy);
  ctx.save();
  ctx.translate(px,py);
  if(flip)ctx.scale(-1,1);
  ctx.drawImage(scvImg,sx,0,SCV_CELL,SCV_ROW_H,-dw/2,-dh+10,dw,dh);
  ctx.restore();
}

function drawBarracks(bx,by,stageIdx){
  if(!bldgImg||!bldgImg.complete||!bldgImg.naturalWidth) return;
  const s=BARR_STAGES[Math.min(stageIdx,5)];
  const scale=0.8;
  const dw=s.w*scale,dh=BARR_H*scale;
  ctx.drawImage(bldgImg,s.x,BARR_Y,s.w,BARR_H,bx-dw/2,by-dh+14,dw,dh);
}

function drawBldg(bx,by,type,progress,isWorking,flickerIdx){
  const stageIdx=Math.min(5,Math.floor(progress*6));
  let drawIdx=stageIdx;
  if(progress>=0.99){
    if(isWorking&&typeof flickerIdx==='number'){
      drawIdx=flickerIdx; // agent-driven flicker (4=off, 5=on)
    } else {
      drawIdx=4; // 불꺼진 완성형
    }
  }
  const s=CC_STAGES[drawIdx];
  const scale=0.8;
  // Always use stage 6 (complete) dimensions for consistent positioning
  const refW=CC_STAGES[5].w*scale,refH=CC_H*scale;
  const dw=s.w*scale,dh=CC_H*scale;
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(bx,by+8,refW*0.4,8,0,0,6.283);ctx.fill();
  if(bldgImg&&bldgImg.complete&&bldgImg.naturalWidth){
    // Anchor to bottom-center using reference size so flickering doesn't shift
    ctx.drawImage(bldgImg,s.x,s.y,s.w,CC_H,bx-dw/2,by-refH+14,dw,dh);
  } else {
    ctx.fillStyle='#4a5a6a';ctx.fillRect(bx-30,by-40,60,40);
  }
  if(progress<0.99&&progress>0.01){
    ctx.strokeStyle='rgba(240,160,48,.4)';ctx.lineWidth=1;ctx.setLineDash([5,4]);
    ctx.strokeRect(bx-dw/2,by-dh+14,dw,dh);ctx.setLineDash([]);
  }
  if(progress>=0.99){
    ctx.strokeStyle='rgba(74,144,208,.3)';ctx.lineWidth=1;
    ctx.strokeRect(bx-dw/2,by-dh+14,dw,dh);
  }
}

// Draw mineral crystal
function drawMineral(mx,my){

// Draw vespene gas animation at geyser positions (each independent)
function drawVespeneGas(){
  if(!gasImg||!gasImg.complete||!gasImg.naturalWidth) return;
  const sc=Math.max(W/MAP_IMG_W,H/MAP_IMG_H);
  const mw=MAP_IMG_W*sc,mh=MAP_IMG_H*sc;
  const ox=(W-mw)/2,oy=(H-mh)/2;
  const dw=GAS_CELL*GAS_SCALE,dh=GAS_H*GAS_SCALE;
  GEYSER_POS.forEach(g=>{
    if(g.paused){
      g.pt-=dt;
      if(g.pt<=0){g.paused=false;g.frame=0;g.ft=0;}
    } else {
      g.ft+=dt;
      if(g.ft>1/GAS_FPS){g.ft-=1/GAS_FPS;g.frame++;
        if(g.frame>=GAS_FRAMES){g.frame=0;g.paused=true;g.pt=GAS_CYCLE_PAUSE;}
      }
      if(!g.paused){
        const fi=Math.floor(g.frame)%GAS_FRAMES;
        const gx=ox+g.mx*mw;
        const gy=oy+g.my*mh;
        ctx.drawImage(gasImg,fi*GAS_CELL,0,GAS_CELL,GAS_H,gx-dw/2,gy-dh,dw,dh);
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// SC1 WATER RIPPLE — animated shimmer on water areas
// ═══════════════════════════════════════════════════════════════
// Pixel-accurate water mask clipping
let waterCanvas=null,waterCtx=null;
function drawWaterRipple(){
  if(!waterMaskImg||!waterMaskImg.complete||!waterMaskImg.naturalWidth)return;
  if(!mapImg||!mapImg.complete||!mapImg.naturalWidth)return;
  const sc=Math.max(W/MAP_IMG_W,H/MAP_IMG_H);
  const mw=MAP_IMG_W*sc,mh=MAP_IMG_H*sc;
  const ox=(W-mw)/2,oy=(H-mh)/2;
  if(!waterCanvas){waterCanvas=document.createElement('canvas');}
  waterCanvas.width=W;waterCanvas.height=H;
  waterCtx=waterCanvas.getContext('2d');
  waterCtx.clearRect(0,0,W,H);
  // Draw wave lines across full viewport
  waterCtx.save();
  for(let i=0;i<10;i++){
    const phase=time*0.12+i*1.2;
    const waveY=((Math.sin(phase)*0.5+0.5)*H+i*H/10)%H;
    const alpha=0.1+0.06*Math.sin(time*0.6+i);
    waterCtx.strokeStyle=`rgba(130,170,230,${alpha})`;
    waterCtx.lineWidth=2+Math.sin(time*0.3+i)*0.8;
    waterCtx.beginPath();
    for(let px=0;px<W;px+=4){
      const py=waveY+Math.sin(px*0.02+time*0.2+i*0.8)*5;
      if(px===0)waterCtx.moveTo(px,py);else waterCtx.lineTo(px,py);
    }
    waterCtx.stroke();
  }
  const pulse=0.06+0.04*Math.sin(time*0.6);
  waterCtx.fillStyle=`rgba(80,130,200,${pulse})`;
  waterCtx.fillRect(0,0,W,H);
  waterCtx.restore();
  // Mask: only keep pixels where water_mask is opaque
  waterCtx.globalCompositeOperation='destination-in';
  waterCtx.drawImage(waterMaskImg,ox,oy,mw,mh);
  waterCtx.globalCompositeOperation='source-over';
  // Composite result onto main canvas
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  ctx.drawImage(waterCanvas,0,0);
  ctx.restore();
}

function drawPbar(x,y,w,p,done){
  ctx.fillStyle='rgba(0,0,0,.5)';rr(x,y,w,4,2);
  if(p>0){ctx.fillStyle=done?'#30d060':'#f0a030';rr(x,y,w*p,4,2);}
}

// SC1 CURSOR — Real StarCraft 1 cursor image
// ═══════════════════════════════════════════════════════════════
const SC1_CURSOR_SIZE=40; // draw size on screen
const SC1_CURSOR_OX=-5,SC1_CURSOR_OY=-10; // hotspot offset (arrow tip alignment)
// Arrow cursor animation: 6 frames, 32x32 each in spritesheet
const ARROW_FRAMES=5,ARROW_CELL=40,ARROW_FPS=8;
let arrowFrame=0,arrowFrameT=0;
// Hover cursor (green spinning circle): 14 frames, 41x41 each in spritesheet
const HOVER_FRAMES=14,HOVER_CELL=41,HOVER_SIZE=48,HOVER_FPS=14;
let hoverFrame=0,hoverFrameT=0;
let cursorHovering=false;
function drawSC1Cursor(x,y){
  const wx=x+cam.x,wy=y+cam.y;
  cursorHovering=agents.some(a=>a.hit(wx,wy)||a.hitBldg(wx,wy));
  if(cursorHovering&&hoverCursorImg&&hoverCursorImg.complete&&hoverCursorImg.naturalWidth){
    // Spinning green circle cursor
    const fi=Math.floor(hoverFrame)%HOVER_FRAMES;
    ctx.drawImage(hoverCursorImg,fi*HOVER_CELL,0,HOVER_CELL,HOVER_CELL,x-HOVER_SIZE/2,y-HOVER_SIZE/2,HOVER_SIZE,HOVER_SIZE);
  } else if(arrowCursorImg&&arrowCursorImg.complete&&arrowCursorImg.naturalWidth){
    // Animated arrow cursor with shimmer
    const fi=Math.floor(arrowFrame)%ARROW_FRAMES;
    ctx.drawImage(arrowCursorImg,fi*ARROW_CELL,0,ARROW_CELL,ARROW_CELL,x+SC1_CURSOR_OX,y+SC1_CURSOR_OY,SC1_CURSOR_SIZE,SC1_CURSOR_SIZE);
  } else if(cursorImg&&cursorImg.complete&&cursorImg.naturalWidth){
    ctx.drawImage(cursorImg,x+SC1_CURSOR_OX,y+SC1_CURSOR_OY,SC1_CURSOR_SIZE,SC1_CURSOR_SIZE);
  }
  // Advance animations
  arrowFrameT+=dt;
  if(arrowFrameT>1/ARROW_FPS){arrowFrameT-=1/ARROW_FPS;arrowFrame=(arrowFrame+1)%ARROW_FRAMES;}
  hoverFrameT+=dt;
  if(hoverFrameT>1/HOVER_FPS){hoverFrameT-=1/HOVER_FPS;hoverFrame=(hoverFrame+1)%HOVER_FRAMES;}
}

// ═══════════════════════════════════════════════════════════════
// SC1 MOVE MARKER — Green ellipse with random size cycle animation
// ═══════════════════════════════════════════════════════════════
// Random cycle patterns: indices 0=small, 1=medium, 2=large
const MARKER_CYCLES=[
  [1,2,1],
  [1,2,0],
  [2,1,0],
  [0,1,2,1,0],
  [1,2,1,0],
];
const MARKER_FRAME_DUR=0.06; // seconds per frame (2x faster)
const MARKER_DRAW_SCALE=1.08; // scale marker images
const MARKER_OX=-8,MARKER_OY=-8; // offset: slightly upper-left
function updateAndDrawMoveMarkers(d){
  moveMarkers=moveMarkers.filter(m=>{
    m.t+=d;
    const totalDur=m.cycle.length*MARKER_FRAME_DUR;
    if(m.t>=totalDur)return false;
    const fi=Math.min(Math.floor(m.t/MARKER_FRAME_DUR),m.cycle.length-1);
    const imgIdx=m.cycle[fi]; // 0,1,2 = small,medium,large
    const img=moveMarkerImgs[imgIdx];
    if(img&&img.complete&&img.naturalWidth){
      const sx=m.x-cam.x+MARKER_OX,sy=m.y-cam.y+MARKER_OY;
      const dw=img.naturalWidth*MARKER_DRAW_SCALE;
      const dh=img.naturalHeight*MARKER_DRAW_SCALE;
      ctx.drawImage(img,sx-dw/2,sy-dh/2,dw,dh);
    }
    return true;
  });
}

}

let terrainImg=null;

function drawMineralPatch(g,rng,cx,cy,count){
  for(let i=0;i<count;i++){
    const a=-0.72+i*(1.44/(count-1)),dist=26+(i%2)*10;
    const mx=cx+Math.cos(a)*dist,my=cy+Math.sin(a)*dist*0.52;
    const sz=9+rng()*3.5,bv=0.72+rng()*0.28;
    g.fillStyle=`rgb(${(68*bv+18)|0},${(128*bv+28)|0},${(192*bv+38)|0})`;
    g.beginPath();g.moveTo(mx,my-sz*.75);g.lineTo(mx+sz*.45,my);g.lineTo(mx+sz*.3,my+sz*.5);g.lineTo(mx-sz*.3,my+sz*.5);g.lineTo(mx-sz*.45,my);g.closePath();g.fill();
    g.fillStyle='rgba(175,218,255,0.58)';g.beginPath();g.moveTo(mx,my-sz*.7);g.lineTo(mx+sz*.18,my-sz*.12);g.lineTo(mx,my-sz*.12);g.closePath();g.fill();
    g.strokeStyle='rgba(0,20,55,0.4)';g.lineWidth=0.8;g.stroke();
  }
}
function drawGeyser(g,rng,cx,cy){
  g.fillStyle='rgb(60,66,50)';g.beginPath();g.ellipse(cx,cy,24,17,0,0,6.283);g.fill();
  g.strokeStyle='rgb(86,92,70)';g.lineWidth=2;g.stroke();
  for(let i=0;i<6;i++){const gx=cx+(rng()-.5)*18,gy=cy-10-rng()*16,gr=7+rng()*11;g.fillStyle=`rgba(${38+rng()*24|0},${108+rng()*52|0},${50+rng()*30|0},${.33+rng()*.3})`;g.beginPath();g.arc(gx,gy,gr,0,6.283);g.fill();}

}

function genTerrain(){
  let _s=0xDEADBEEF;
  const rng=()=>{_s=Math.imul(_s^(_s>>>16),0x45d9f3b);_s=Math.imul(_s^(_s>>>16),0x45d9f3b);_s^=_s>>>16;return(_s>>>0)/4294967296;};

  const TW=1400,TH=900; // fallback terrain size
  const c=document.createElement('canvas');c.width=TW;c.height=TH;const g=c.getContext('2d');
  const COLS=Math.ceil(TW/TILE),ROWS=Math.ceil(TH/TILE);
  const LOW=0,HIGH=1,CLIFF=2,RAMP=3,DEEP=4;
  const map=new Uint8Array(COLS*ROWS).fill(LOW);
  const T=(x,y)=>x>=0&&x<COLS&&y>=0&&y<ROWS?map[y*COLS+x]:LOW;
  const S=(x,y,v)=>{if(x>=0&&x<COLS&&y>=0&&y<ROWS)map[y*COLS+x]=v;};

  const cliffRow=19;
  for(let y=cliffRow+1;y<ROWS;y++) for(let x=0;x<COLS;x++) S(x,y,HIGH);

  const rampA=3,rampB=9;
  for(let x=0;x<COLS;x++) S(x,cliffRow,x>=rampA&&x<=rampB?RAMP:CLIFF);

  for(let x=0;x<COLS;x++){if(T(x,cliffRow)===CLIFF&&rng()<.14)S(x,cliffRow-1,CLIFF);}

  [[2,5,3,3],[41,6,3,3],[5,14,2,2],[38,12,2,2],[19,3,2,2],[13,17,2,2],[30,16,2,2],[25,8,3,2],[9,10,2,2],[35,3,2,2]].forEach(([cx,cy,rw,rh])=>{
    for(let dy=-rh;dy<=rh;dy++) for(let dx=-rw;dx<=rw;dx++) if(T(cx+dx,cy+dy)===LOW)S(cx+dx,cy+dy,DEEP);
  });

  for(let ty=0;ty<ROWS;ty++) for(let tx=0;tx<COLS;tx++){
    const px=tx*TILE,py=ty*TILE,t=T(tx,ty),v=.83+rng()*.17;
    if(t===HIGH){
      g.fillStyle=`rgb(${92*v|0},${76*v|0},${43*v|0})`;g.fillRect(px,py,TILE,TILE);
      for(let d=0;d<3;d++){rng();rng();g.fillStyle=`rgba(${66+rng()*28|0},${54+rng()*22|0},${28+rng()*16|0},.22)`;g.fillRect(px+rng()*TILE,py+rng()*TILE,2+rng()*5,2+rng()*3);}
    } else if(t===LOW){
      g.fillStyle=`rgb(${36*v|0},${56*v|0},${22*v|0})`;g.fillRect(px,py,TILE,TILE);
      for(let d=0;d<3;d++){rng();rng();g.fillStyle=`rgba(${22+rng()*18|0},${38+rng()*22|0},${12+rng()*14|0},.26)`;g.fillRect(px+rng()*TILE,py+rng()*TILE,3+rng()*5,2+rng()*4);}
    } else if(t===DEEP){
      g.fillStyle=`rgb(${22*v|0},${38*v|0},${12*v|0})`;g.fillRect(px,py,TILE,TILE);
      rng();rng();g.fillStyle='rgba(0,0,0,.18)';g.fillRect(px+rng()*TILE,py+rng()*TILE,4+rng()*8,3+rng()*6);
      rng();rng();
    } else if(t===CLIFF){
      const cv=.48+rng()*.18;g.fillStyle=`rgb(${44*cv|0},${36*cv|0},${20*cv|0})`;g.fillRect(px,py,TILE,TILE);
    } else if(t===RAMP){
      const gr=g.createLinearGradient(px,py,px,py+TILE);
      gr.addColorStop(0,`rgb(${36*v|0},${56*v|0},${22*v|0})`);
      gr.addColorStop(1,`rgb(${90*v|0},${74*v|0},${42*v|0})`);
      g.fillStyle=gr;g.fillRect(px,py,TILE,TILE);rng();rng();
    }
  }

  for(let tx=0;tx<COLS;tx++) for(let ty=0;ty<ROWS;ty++){
    const t=T(tx,ty),px=tx*TILE,py=ty*TILE;
    if(t===HIGH&&(T(tx,ty-1)===CLIFF||T(tx,ty-1)===RAMP)){
      const sg=g.createLinearGradient(px,py,px,py+22);sg.addColorStop(0,'rgba(0,0,0,.58)');sg.addColorStop(1,'rgba(0,0,0,0)');g.fillStyle=sg;g.fillRect(px,py,TILE,22);
    }
    if((t===LOW||t===DEEP)&&(T(tx,ty+1)===CLIFF||T(tx,ty+1)===HIGH)){
      const sg=g.createLinearGradient(px,py+TILE-16,px,py+TILE);sg.addColorStop(0,'rgba(0,0,0,0)');sg.addColorStop(1,'rgba(0,0,0,.62)');g.fillStyle=sg;g.fillRect(px,py+TILE-16,TILE,16);
    }
  }

  g.strokeStyle='rgba(0,0,0,.5)';g.lineWidth=1.8;
  g.beginPath();g.moveTo(rampA*TILE,cliffRow*TILE);g.lineTo(rampA*TILE,(cliffRow+2)*TILE);g.stroke();
  g.beginPath();g.moveTo((rampB+1)*TILE,cliffRow*TILE);g.lineTo((rampB+1)*TILE,(cliffRow+2)*TILE);g.stroke();
  g.strokeStyle='rgba(0,0,0,.22)';g.lineWidth=.8;
  for(let i=1;i<4;i++){const ry=cliffRow*TILE+i*(TILE/3);g.beginPath();g.moveTo(rampA*TILE,ry);g.lineTo((rampB+1)*TILE,ry);g.stroke();}

  for(let ty=0;ty<ROWS-1;ty++) for(let tx=0;tx<COLS;tx++){
    if(T(tx,ty)===DEEP&&rng()<.44){
      const bx=tx*TILE+TILE*.5,by=ty*TILE+TILE*.55,nc=2+(rng()*3|0);
      for(let i=0;i<nc;i++){
        const tr=7+rng()*10,tcx=bx+(rng()-.5)*22,tcy=by+(rng()-.5)*18,tv=.52+rng()*.28;
        g.fillStyle=`rgba(${15*tv|0},${32*tv|0},${8*tv|0},.9)`;g.beginPath();g.arc(tcx,tcy,tr,0,6.283);g.fill();
        g.fillStyle=`rgba(${26*tv|0},${50*tv|0},${14*tv|0},.48)`;g.beginPath();g.arc(tcx-tr*.3,tcy-tr*.35,tr*.52,0,6.283);g.fill();
      }
    } else {rng();}
  }

  for(let i=0;i<30;i++){
    const rx=40+rng()*(TW-80),ry=40+rng()*(TH-80);
    const rt=T(rx/TILE|0,ry/TILE|0);
    if(rt===LOW||rt===HIGH||rt===DEEP){
      const rs=4+rng()*9,rh2=3+rng()*6,rv=.42+rng()*.28;
      g.fillStyle=`rgba(${(46*rv+30)|0},${(40*rv+24)|0},${(22*rv+12)|0},.58)`;
      g.beginPath();g.ellipse(rx,ry,rs,rh2,rng()*3.14,0,6.283);g.fill();
      g.fillStyle='rgba(255,255,255,.055)';g.beginPath();g.ellipse(rx-rs*.22,ry-rh2*.25,rs*.42,rh2*.32,0,0,6.283);g.fill();
    }
  }

  drawMineralPatch(g,rng,175,710,8);
  drawMineralPatch(g,rng,1155,718,8);
  drawMineralPatch(g,rng,655,552,6);
  drawGeyser(g,rng,395,782);
  drawGeyser(g,rng,975,788);
  drawGeyser(g,rng,818,548);

  terrainImg=c;
}

// ═══════════════════════════════════════════════════════════════
// AGENT CLASS
// ═══════════════════════════════════════════════════════════════
class Agent{
  constructor(id,name,sx,sy,bx,by,bt,meta={}){
    this.id=id;this.name=name;this.x=sx;this.y=sy;
    this.bx=bx;this.by=by;this.bt=bt;
    this.state='idle';this.progress=0; // CC not built yet
    this.fr=0;this.ft=0;this._moving=false;
    this.vDir=12;this.tDir=12;
    this.spd=0;
    this.tx=sx;this.ty=sy;this.mcb=null;
    this.hx=sx;this.hy=sy;this.it=0;
    this.pc={x:bx,y:by};this.pw=0;this.ipw=false;
    this.selected=false; // SC1 persistent selection
    this.sparks=[];
    this.chingTimer=2.5;
    this.flashAlpha=0;this.flashScale=1;
    // Manual command state
    this.manualTimer=0;this.prevAutoState=null;
    // Mineral position (below command center)
    this.mx=bx;this.my=by+90; // mineral exactly centered below CC, aligned
    this.ccFlicker=genCCFlicker();this.ccFlickerT=0;
    this.miningTarget=false;
    this.miningPause=0; // seconds remaining to mine at mineral
    this.engine=meta.engine||'mock';
    this.model=meta.model||'demo';
    this.role=meta.role||'builder';
    this.locked=!!meta.locked;
    this.sessionKind=meta.sessionKind||'';
    this.runId=null;
    this.runStatus='idle';
    this.runPhase='idle';
    this.runLabel='Idle';
    this.runPrompt='';
    this.taskTitle=meta.taskTitle||'Waiting';
    this.runSummary='';
    this.runLogs=[];
    this.filesChanged=[];
    this.errorText='';
    this.progressMode='auto';
    this.targetProgress=0;
    this.demolishTimer=0;
    this.demolishNext=null;
    this.workspaceStrategy='';
    this.workspaceBranch='';
    this.nickname=meta.nickname||'';
    this.displayName=meta.displayName||'';
    this.chatBubble='';
    this.chatBubbleTimer=0;
  }
  syncMeta(meta={}){
    this.name=meta.name||this.name;
    this.engine=meta.engine||this.engine;
    this.model=meta.model||this.model;
    this.role=meta.role||this.role;
    this.locked=meta.locked ?? this.locked;
    if(meta.nickname!==undefined)this.nickname=meta.nickname;
    if(meta.displayName!==undefined)this.displayName=meta.displayName;
    this.sessionKind=meta.sessionKind||this.sessionKind;
    this.taskTitle=meta.taskTitle||this.taskTitle;
    updateCard(this.id);
  }
  startBuild(opts={}){
    const allowRestart=!!opts.force;
    if(!allowRestart&&this.state!=='idle'&&this.state!=='manual_idle'&&this.state!=='patrol'&&this.state!=='idle_at_bldg'&&this.state!=='complete')return;
    stopWeld(this.id);
    if(opts.progressMode)this.progressMode=opts.progressMode;
    if(typeof opts.targetProgress==='number')this.targetProgress=opts.targetProgress;
    if(audioUnlocked){playVNow(SCV_VOICES[Math.random()*SCV_VOICES.length|0]);play('click',.3);}
    this.manualTimer=0;this.prevAutoState=null;
    if(this.progress>=1){
      // CC already built → go mine minerals
      this.miningTarget=true;
      this.miningPause=0;
      this.moveTo(this.mx,this.my,()=>this.setState('building'));
      this.setState('move_to_build');
    } else {
      // CC not built yet → go on top of building site to construct
      this.moveTo(this.bx+(Math.random()-.5)*20,this.by-5,()=>this.setState('building'));
      this.setState('move_to_build');
    }
  }
  setState(s){
    const old=this.state;this.state=s;
    if(old==='building')stopWeld(this.id);
    if(s==='building'){startWeld(this.id);this.chingTimer=2.5;}
    if(s==='complete'){
      this.progressMode='auto';
      this.targetProgress=1;
      this.runStatus=this.runStatus==='running'?'done':this.runStatus;
      this.runPhase=this.runPhase==='idle'?'done':this.runPhase;
      this.runLabel=this.runLabel==='Idle'?'Complete':this.runLabel;
      stopWeld(this.id);
      this.flashAlpha=1;this.flashScale=1;
      setTimeout(()=>playV('scv_jobdone'),400);
      play('complete',.4);
      setTimeout(()=>{
        if(this.state==='complete'){
          // Move to below CC energy bar — 8 random directions (9시~3시)
          const dirs=[Math.PI,Math.PI*7/8,Math.PI*3/4,Math.PI/2,Math.PI*5/8,Math.PI*3/8,Math.PI/4,0];
          const angle=dirs[Math.random()*dirs.length|0];
          const dist=45+Math.random()*10;
          const tx=this.bx+Math.cos(angle)*dist;
          const ty=this.by+25+Math.sin(angle)*dist*0.5;
          this.moveTo(tx,ty,null);
          this.setState('idle_at_bldg');
        }
      },2000);
    }
    if(s==='demolishing'){stopWeld(this.id);}
    updateCard(this.id);
  }
  beginLiveRun(run){
    this.runId=run.id;
    this.runStatus='running';
    this.runPhase=run.phase||'planning';
    this.runLabel='Preparing';
    this.runPrompt=run.prompt||this.runPrompt;
    this.taskTitle=run.taskTitle||summarizePrompt(run.prompt);
    this.runSummary='';
    this.runLogs=[];
    this.filesChanged=[];
    this.errorText='';
    this.workspaceStrategy=run.workspaceStrategy||'git-worktree';
    this.workspaceBranch=run.branch||`agent/${this.id}`;
    this.progressMode='live';
    this.targetProgress=Math.max(0.06,run.progress||0.08);
    // No demolition — CC stays built, just start mining
    this.startBuild({force:true,progressMode:'live',targetProgress:this.targetProgress});
    updateCard(this.id);
  }
  beginDemolition(nextStep){
    initAudio();
    const ae=audioEls.scv_explo;
    if(ae){const ex=new Audio(ae.src);ex.volume=0.55;ex.play().catch(()=>{});}
    this.demolishTimer=.42;
    this.demolishNext=nextStep||null;
    this.setState('demolishing');
    for(let i=0;i<14;i++)this.sparks.push({x:this.bx+(Math.random()-.5)*44,y:this.by-24+(Math.random()-.5)*30,vx:(Math.random()-.5)*120,vy:-40-Math.random()*80,life:.25+Math.random()*.25});
  }
  applyRunPhase(phase,progress,label){
    if(!this.runId&&phase!=='done')return;
    this.runStatus='running';
    this.runPhase=phase||this.runPhase;
    this.runLabel=label||this.runLabel;
    this.progressMode='live';
    if(typeof progress==='number'){
      this.targetProgress=Math.max(this.targetProgress,Math.min(1,progress));
    }
    if((this.state==='idle'||this.state==='manual_idle')&&phase!=='done'&&this.demolishTimer<=0){
      this.startBuild({force:true,progressMode:'live',targetProgress:this.targetProgress||0.08});
    }
    updateCard(this.id);
  }
  appendRunLog(text){
    if(!text)return;
    this.runLogs.push(text);
    if(this.runLogs.length>80)this.runLogs=this.runLogs.slice(-80);
    this.runSummary=this.runLogs.slice(-8).join('\n\n');
    // 코드가 아닌 일반 대화만 말풍선으로 표시
    const clean=text.replace(/```[\s\S]*?```/g,'').replace(/^\s*[-*]\s/gm,'').trim();
    if(clean.length>3&&!clean.startsWith('ERROR')&&!clean.startsWith('MOCK')){
      this.chatBubble=clean.slice(0,300)+(clean.length>300?'…':'');
      this.chatBubbleTimer=999; // stays until next message replaces it
    }
    syncDrawer();
  }
  finishRun(status,run){
    this.runStatus=status;
    this.runPhase=status==='done'?'done':status;
    this.runLabel=status==='done'?'Complete':status==='failed'?'Failed':'Cancelled';
    // Clear chat bubble after 5 seconds when task ends
    setTimeout(()=>{if(this.runStatus!=='running')this.chatBubbleTimer=0;},5000);
    this.runSummary=run.summary||this.runSummary;
    this.filesChanged=run.filesChanged||this.filesChanged;
    this.errorText=run.errorText||this.errorText;
    if(status==='done'){
      this.targetProgress=1;
      this.progressMode='live';
      if(this.state==='idle'||this.state==='manual_idle')this.startBuild({force:true,progressMode:'live',targetProgress:1});
    } else {
      stopWeld(this.id);
      this.progressMode='auto';
      this.mcb=null;
      if(this.state==='building'||this.state==='move_to_build'||this.state==='demolishing')this.state='idle_at_bldg';
    }
    updateCard(this.id);
    syncDrawer();
    if(typeof generateAgentReport==='function')generateAgentReport(this,status,run);
  }
  // SC1 right-click move command
  commandMove(wx,wy){
    if(this.state==='demolishing')return false;
    // Save previous state for autonomous resume
    if(this.state!=='manual_move'&&this.state!=='manual_idle'){
      this.prevAutoState=this.state;
    }
    this.manualTimer=0;
    this.setState('manual_move');
    this.moveTo(wx,wy,()=>{
      this.setState('manual_idle');
      this.manualTimer=MANUAL_IDLE_TIME;
    });
    return true;
  }
  resumeAutonomous(){
    const prev=this.prevAutoState||'idle';
    this.prevAutoState=null;this.manualTimer=0;
    if(prev==='patrol'||prev==='idle_at_bldg'||prev==='complete'){
      this.startPatrol();
    } else if(prev==='move_to_build'){
      this.moveTo(this.bx-35,this.by+15,()=>this.setState('building'));
      this.setState('move_to_build');
    } else {
      this.setState('idle');
    }
  }
  moveTo(x,y,cb){this.tx=x;this.ty=y;this.mcb=cb;}
  // Collect obstacles this SCV should avoid (other agents' minerals, buildings, gas)
  _getObstacles(){
    const obs=[];
    const myId=this.id;
    // Other agents' minerals (radius ~20)
    agents.forEach(a=>{
      if(a.id===myId)return;
      if(a.mx&&a.my)obs.push({x:a.mx,y:a.my,r:22});
    });
    // Own mineral — avoid when NOT mining toward it
    if(this.mx&&this.my&&!(this.state==='building'&&this.miningTarget)){
      obs.push({x:this.mx,y:this.my,r:22});
    }
    // Other agents' buildings (radius ~50)
    agents.forEach(a=>{
      if(a.id===myId)return;
      if(a.progress>0.05)obs.push({x:a.bx,y:a.by,r:55});
    });
    // Gas geysers (convert to world coords: same as screen since cam usually ~0)
    GEYSER_POS.forEach(g=>{
      const gx=g.mx*WORLD_W,gy=g.my*WORLD_H;
      obs.push({x:gx,y:gy,r:28});
    });
    return obs;
  }
  doMove(d){
    const dx=this.tx-this.x,dy=this.ty-this.y,dist=Math.sqrt(dx*dx+dy*dy);
    const isMining=this.state==='building'||this.state==='move_to_build';
    const accel=isMining?MINING_ACCEL:SCV_ACCEL;
    if(dist<2){
      this.x=this.tx;this.y=this.ty;
      this.spd=Math.max(0,this.spd-accel*d*2);
      if(this.mcb){const c=this.mcb;this.mcb=null;c();}
      return false;
    }
    // Base desired direction
    let mx=dx/dist,my=dy/dist;
    // Obstacle avoidance — steering force
    const obstacles=this._getObstacles();
    let steerX=0,steerY=0;
    const avoidDist=45; // detection range
    for(const ob of obstacles){
      const odx=this.x-ob.x,ody=this.y-ob.y;
      const oDist=Math.sqrt(odx*odx+ody*ody);
      const minDist=ob.r+12; // SCV radius ~12
      if(oDist<avoidDist&&oDist>0.5){
        // Stronger push the closer we are
        const strength=(avoidDist-oDist)/avoidDist;
        const pushX=odx/oDist,pushY=ody/oDist;
        steerX+=pushX*strength*2.5;
        steerY+=pushY*strength*2.5;
        // Hard separation — don't allow overlap
        if(oDist<minDist){
          this.x=ob.x+odx/oDist*minDist;
          this.y=ob.y+ody/oDist*minDist;
        }
      }
    }
    // Blend steering into movement direction
    if(steerX!==0||steerY!==0){
      mx+=steerX;my+=steerY;
      const len=Math.sqrt(mx*mx+my*my);
      if(len>0){mx/=len;my/=len;}
    }
    const deg=((Math.atan2(my,mx)*180/Math.PI)+360)%360;
    this.tDir=Math.round(deg/22.5)%16;
    const maxSpd=this.state==='patrol'?PATROL_SPEED:isMining?MINING_SPEED:MOVE_SPEED;
    const decelDist=isMining?SCV_DECEL_DIST*2:SCV_DECEL_DIST;
    if(dist<decelDist){
      const target=Math.max(0.15,dist/decelDist);
      this.spd=Math.max(target,this.spd-accel*d*1.5);
    } else {
      this.spd=Math.min(1,this.spd+accel*d);
    }
    const sp=maxSpd*this.spd*d;
    this.x+=mx*sp;this.y+=my*sp;
    // CC collision: after built, SCV can't go above CC bottom edge
    if(this.progress>=1&&this.state!=='building'){
      const ccBottom=this.by+18;
      if(this.y<ccBottom&&Math.abs(this.x-this.bx)<50){
        this.y=ccBottom;
      }
    }
    // Keep SCV within playable area
    this.x=Math.max(20,Math.min(WORLD_W-20,this.x));
    this.y=Math.max(20,Math.min(WORLD_H-20,this.y));
    this._moving=true;
    return true;
  }
  startPatrol(){this.pc={x:this.bx,y:this.by};this.setState('patrol');this.pickPP();}
  pickPP(){
    const a=Math.random()*6.283,r=20+Math.random()*55;
    this.moveTo(this.pc.x+Math.cos(a)*r,this.pc.y+Math.sin(a)*r+15,()=>{this.ipw=true;this.pw=1.5+Math.random()*3;});
  }
  update(d){
    this._moving=false;
    if(this.flashAlpha>0){this.flashAlpha-=d*1.2;this.flashScale+=d*2.5;}
    if(this.chatBubbleTimer>0)this.chatBubbleTimer-=d;
    this.sparks=this.sparks.filter(s=>{s.life-=d;s.x+=s.vx*d;s.y+=s.vy*d;s.vy+=120*d;return s.life>0;});
    switch(this.state){
      case'idle':this.it+=d;if(this.it>2+Math.random()*3){this.it=0;this.moveTo(this.hx+(Math.random()-.5)*50,this.hy+(Math.random()-.5)*30,null);}this.doMove(d);break;
      case'move_to_build':this.doMove(d);break;
      case'building':
        if(this.progress<1){
          // === CONSTRUCTION PHASE: build the CC ===
          if(this.progressMode==='live'){
            const liveRate=this.targetProgress>=1?.95:.55;
            this.progress=Math.min(this.targetProgress,this.progress+liveRate*d);
            if(this.runStatus==='done'&&this.progress>=.999){this.progress=1;this.setState('complete');break;}
          } else {
            this.progress+=BUILD_SPEED*d;
            if(this.progress>=1){this.progress=1;this.setState('complete');break;}
          }
          // SCV wanders on top of building while constructing
          if(!this.mcb){
            const cx=this.bx+(Math.random()-.5)*40;
            const cy=this.by-10+(Math.random()-.5)*20;
            this.moveTo(cx,cy,null);
          }
          this.doMove(d);
          // Construction sparks
          if(this.fr%3===0){const vd=Math.round(this.vDir)%16;for(let i=0;i<2;i++)this.sparks.push({x:this.x+((vd>=5&&vd<=11)?-20:20),y:this.y-2+Math.sin(this.fr*.6)*5,vx:(Math.random()-.5)*60,vy:-30-Math.random()*50,life:.15+Math.random()*.25});}
        } else {
          // === MINING PHASE: CC built, mine minerals ===
          // Live progress tracking for task completion
          if(this.progressMode==='live'&&this.runStatus==='done'){
            this.setState('complete');break;
          }
          // Mining pause at mineral (6 seconds)
          if(this.miningPause>0){
            this.miningPause-=d;
            if(this.fr%4===0){
              for(let i=0;i<2;i++)this.sparks.push({x:this.mx+(Math.random()-.5)*10,y:this.my-8,vx:(Math.random()-.5)*40,vy:-20-Math.random()*30,life:.12+Math.random()*.15});
            }
            break;
          }
          // Mining movement: SCV goes between mineral and CC
          if(!this.mcb){
            if(this.miningTarget){
              this.moveTo(this.mx,this.my,()=>{
                this.miningPause=MINING_PAUSE;
                this.miningTarget=false;
              });
            } else {
              this.moveTo(this.bx-15,this.by+10,()=>{
                this.miningTarget=true;
              });
            }
          }
          this.doMove(d);
        }
        break;
      case'demolishing':
        this.demolishTimer-=d;
        if(this.fr%2===0){
          for(let i=0;i<3;i++)this.sparks.push({x:this.bx+(Math.random()-.5)*48,y:this.by-24+(Math.random()-.5)*24,vx:(Math.random()-.5)*90,vy:-20-Math.random()*70,life:.1+Math.random()*.2});
        }
        if(this.demolishTimer<=0){
          this.progress=0;
          const next=this.demolishNext;
          this.demolishNext=null;
          this.setState('idle');
          if(next)next();
        }
        break;
      case'complete':break;
      case'patrol':
        if(this.ipw){this.pw-=d;if(this.pw<=0){this.ipw=false;if(Math.random()<.2){this.setState('idle_at_bldg');break;}this.pickPP();}}
        else{const m=this.doMove(d);if(!m&&!this.mcb){this.ipw=true;this.pw=1+Math.random()*3;}}
        break;
      case'idle_at_bldg':this.doMove(d);break; // stand near CC entrance
      // Manual command states
      case'manual_move':this.doMove(d);break;
      case'manual_idle':
        this.manualTimer-=d;
        if(this.manualTimer<=0)this.resumeAutonomous();
        break;
    }
    // Smooth direction interpolation
    if(this._moving){
      let diff=this.tDir-this.vDir;
      if(diff>8)diff-=16; if(diff<-8)diff+=16;
      if(Math.abs(diff)>0.1){
        const step=Math.sign(diff)*Math.min(Math.abs(diff),SCV_TURN_RATE*d);
        this.vDir=((this.vDir+step)%16+16)%16;
      } else {
        this.vDir=this.tDir;
      }
    }
    this.ft+=d;
    if(this.ft>.13){
      this.ft-=.13;
      if(this._moving||this.state==='building')this.fr++;
    }
  }
  draw(){
    const sx=this.bx-cam.x,sy=this.by-cam.y;
    // Draw mineral below command center
    const mmx=this.mx-cam.x,mmy=this.my-cam.y;
    drawMineral(mmx,mmy);
    // Building selection circle (SC1 bright green, near-circular)
    if(this.selected&&(this.progress>0||this.state==='demolishing')){
      const stageIdx=Math.min(5,Math.floor(Math.max(this.progress,.08)*6));
      const bs=CC_STAGES[stageIdx];
      const bw=bs.w*0.8;
      const br=Math.max(bw/2+4,30);
      ctx.save();
      ctx.strokeStyle='#00ff00';
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.ellipse(sx,sy-20,br,br*0.75,0,0,6.283);
      ctx.stroke();
      ctx.restore();
    }
    // Building sprite
    const isWorking=this.runStatus==='running'||(this.state==='building'&&this.progress>=1);
    // Advance CC flicker animation
    let flickerIdx=undefined;
    if(isWorking){
      this.ccFlickerT+=dt;
      if(this.ccFlickerT>0.12){this.ccFlickerT-=0.12;}
      const fi=Math.floor(time*8)%this.ccFlicker.length;
      flickerIdx=this.ccFlicker[fi];
    }
    const visibleProgress=this.state==='demolishing'?Math.max(this.progress,.12)*Math.max(0,this.demolishTimer/.42):this.progress;
    if(visibleProgress>0){
      ctx.save();
      if(this.state==='demolishing')ctx.globalAlpha=Math.max(.08,this.demolishTimer/.42);
      drawBldg(sx,sy,this.bt,visibleProgress,isWorking,flickerIdx);
      ctx.restore();
      const ln=this.progress>=1&&this.runStatus!=='running'?'CMD Center ✓':'CMD Center';
      label(sx,sy-58,ln,this.progress>=1?'#40ff40':'#f0a030',9);
    }
    if(this.progress>0)drawPbar(sx-24,sy+14,48,this.progress,this.progress>=1&&this.runStatus!=='running');
    if(this.flashAlpha>0){
      ctx.save();ctx.globalAlpha=this.flashAlpha*.5;ctx.fillStyle='#4af0ff';
      ctx.beginPath();ctx.arc(sx,sy,30*this.flashScale,0,6.283);ctx.fill();ctx.restore();
    }
    // SCV
    const ux=this.x-cam.x,uy=this.y-cam.y;
    // SC1 Selection circle — persistent bright green #00FF00, 1px width, near body base
    if(this.selected){
      ctx.save();
      ctx.strokeStyle='#00ff00';
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.ellipse(ux,uy-14,12,6,0,0,6.283);
      ctx.stroke();
      ctx.restore();
    }
    drawScvSprite(ux,uy,this.vDir,this.fr);
    // Sparks
    this.sparks.forEach(s=>{
      ctx.fillStyle=`rgba(255,220,68,${Math.min(1,s.life*4)})`;
      ctx.beginPath();ctx.arc(s.x-cam.x,s.y-cam.y,1.5,0,6.283);ctx.fill();
    });
    // Model name always shown above SCV
    const modelLabel=`${(this.engine||'').toUpperCase()} ${this.model||''}`.trim();
    label(ux,uy-50,modelLabel,'#4a9eff',8);
    // Nickname below SCV (yellow), or name if no nickname
    const displayName=this.nickname||this.displayName||this.name;
    label(ux,uy+38,displayName,'#ffdd44',10);
  }
  // Chat bubble — drawn in separate pass so it's always on top
  drawBubble(){
    if(!this.chatBubble||this.chatBubbleTimer<=0)return;
    const ux=this.x-cam.x,uy=this.y-cam.y;
    ctx.save();
    ctx.globalAlpha=0.92;
    ctx.font='bold 11px Consolas,monospace';
    const maxW=180;
    const words=this.chatBubble.split(' ');
    const lines=[];
    let line='';
    for(const w of words){
      const test=line?line+' '+w:w;
      if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w;}
      else line=test;
    }
    if(line)lines.push(line);
    // Max 10 lines
    if(lines.length>10){lines.length=10;lines[9]+='…';}
    const lineH=14;
    const tw=Math.min(maxW,Math.max(...lines.map(l=>ctx.measureText(l).width)));
    const bw=tw+16,bh=lines.length*lineH+10;
    const bx=ux-bw/2,by=uy-70-bh;
    ctx.fillStyle='rgba(0,0,0,0.65)';
    ctx.strokeStyle='rgba(100,160,255,0.3)';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(bx+4,by);ctx.lineTo(bx+bw-4,by);ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+4);ctx.lineTo(bx+bw,by+bh-4);ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-4,by+bh);ctx.lineTo(bx+4,by+bh);ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-4);ctx.lineTo(bx,by+4);ctx.quadraticCurveTo(bx,by,bx+4,by);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.65)';
    ctx.beginPath();ctx.moveTo(ux-5,by+bh);ctx.lineTo(ux,by+bh+6);ctx.lineTo(ux+5,by+bh);ctx.fill();
    ctx.fillStyle='#e0f0ff';
    ctx.textAlign='center';
    for(let i=0;i<lines.length;i++){
      ctx.fillText(lines[i],ux,by+14+i*lineH);
    }
    ctx.restore();
  }
  select(){if(audioUnlocked){play('select',.3);playVNow(SCV_VOICES[Math.random()*SCV_VOICES.length|0]);}}
  hit(wx,wy){return Math.abs(wx-this.x-8)<28&&Math.abs(wy-this.y-8)<35;}
  hitBldg(wx,wy){
    if(this.progress<=0&&this.state!=='demolishing')return false;
    const stageIdx=Math.min(5,Math.floor(Math.max(this.progress,.08)*6));
    const s=CC_STAGES[stageIdx];
    const dw=s.w*0.8,dh=CC_H*0.8;
    return wx>=this.bx-dw/2&&wx<=this.bx+dw/2&&wy>=this.by-dh+14&&wy<=this.by+14;
  }
}

// SELECTION HELPERS
// ═══════════════════════════════════════════════════════════════
function clearSelection(){
  selectedAgents.forEach(id=>{
    const a=agents.find(a=>a.id===id);
    if(a)a.selected=false;
    const c=document.getElementById(`ac-${id}`);
    if(c)c.classList.remove('selected');
  });
  selectedAgents.clear();
  closeTaskDrawer();
}
function selectAgent(a){
  a.selected=true;
  selectedAgents.add(a.id);
  const c=document.getElementById(`ac-${a.id}`);
  if(c)c.classList.add('selected');
}
function syncCardSelection(){
  agents.forEach(a=>{
    const c=document.getElementById(`ac-${a.id}`);
    if(!c)return;
    if(selectedAgents.has(a.id)){
      c.classList.add('selected');
    } else {
      c.classList.remove('selected');
    }
  });
  if(selectedAgents.size===1){
    openTaskDrawer([...selectedAgents][0]);
  } else {
    closeTaskDrawer();
  }
}

// BUILD SLOTS
// ═══════════════════════════════════════════════════════════════
// Build slots positioned above the mineral line (map fraction based)
// Minerals are at ~x=0.46-0.75, y=0.85-0.93; gas at ~x=0.4, y=0.69
// CC slots spread horizontally above minerals, below gas
const slots=[];
function initSlots(){
  slots.length=0;
  const cols=4,rows=3;
  const gx=260,gy=320;
  const totalW=(cols-1)*gx,totalH=(rows-1)*gy;
  const baseX=(WORLD_W-totalW)/2,baseY=200;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)slots.push({x:Math.round(baseX+c*gx),y:Math.round(baseY+r*gy),u:false});
}
initSlots();
window.addEventListener('resize',()=>{initSlots();});
function nextSlot(){const s=slots.find(s=>!s.u);if(s){s.u=true;return s;}return{x:WORLD_W*0.35+Math.random()*WORLD_W*0.4,y:WORLD_H*0.4+Math.random()*WORLD_H*0.3,u:true};}

// ═══════════════════════════════════════════════════════════════
// MANAGEMENT
// ═══════════════════════════════════════════════════════════════
function spawnAgent(options){
  const meta=typeof options==='string'?{name:options}:options||{};
  if(!meta.silent)initAudio();
  const id=meta.id??nextId++;
  if(typeof id==='number'&&id>=nextId)nextId=id+1;
  const n=meta.name||`Agent-${String(id).padStart(2,'0')}`;
  const sx=WORLD_W*0.45+Math.random()*WORLD_W*0.15,sy=WORLD_H*0.82+Math.random()*WORLD_H*0.06;
  const sl=nextSlot();const bt='command_center';
  const existing=findAgent(id);
  if(existing){
    existing.syncMeta(meta);
    return existing.id;
  }
  const a=new Agent(id,n,sx,sy,sl.x,sl.y,bt,meta);agents.push(a);
  addCard(a);updCnt();
  if(!meta.silent){play('click',.3);playV('scv_ready');}
  return id;
}
function startAllMock(){
  initAudio();
  agents.forEach((a,i)=>{
    const prompt=document.getElementById('task-prompt').value.trim()||'Mock task';
    setTimeout(()=>{
      a.beginLiveRun({
        id:`mock-${Date.now()}-${a.id}`,
        prompt,
        taskTitle:summarizePrompt(prompt),
        progress:.08,
        phase:'planning',
      });
      a.appendRunLog(`MOCK START: ${prompt}`);
      let progress=.08;
      const timer=setInterval(()=>{
        progress=Math.min(1,progress+.12);
        const phase=progress<.25?'planning':progress<.8?'coding':'summarizing';
        a.applyRunPhase(phase,progress,phase==='coding'?'Mock coding...':'Mock running...');
        if(progress>=1){
          clearInterval(timer);
          a.finishRun('done',{summary:`${a.name} mock run finished.`,filesChanged:[]});
        }
      },500);
    },i*350);
  });
}
async function removeAgent(id){
  initAudio();
  const idx=agents.findIndex(a=>a.id===id);if(idx<0)return;
  const a=agents[idx];
  // 2-C: cancel running task first, then cleanup worktree via backend
  if(liveMode){
    try{
      updateLiveStatus(`Removing ${a.name}...`);
      await liveAPI.removeAgent(String(id));
    }catch(err){
      updateLiveStatus(`Remove failed: ${err.message}`);
      return;
    }
  }
  stopWeld(id);
  selectedAgents.delete(id);
  // Explosion effect on both SCV and building
  const ae=audioEls.scv_explo;
  if(ae){const ex=new Audio(ae.src);ex.volume=0.7;ex.play().catch(()=>{});}
  // SCV sparks
  for(let i=0;i<18;i++)a.sparks.push({x:a.x,y:a.y,vx:(Math.random()-.5)*140,vy:-60-Math.random()*90,life:.5+Math.random()*.4});
  // Building sparks if building exists
  if(a.progress>0.01){
    for(let i=0;i<12;i++)a.sparks.push({x:a.bx+(Math.random()-.5)*50,y:a.by-20+(Math.random()-.5)*30,vx:(Math.random()-.5)*100,vy:-30-Math.random()*60,life:.3+Math.random()*.3});
  }
  // Delay removal so explosion is visible
  setTimeout(()=>{
    const removeIdx=agents.findIndex(ag=>ag.id===id);
    if(removeIdx>=0)agents.splice(removeIdx,1);
    const card=document.getElementById(`ac-${id}`);if(card)card.remove();
    if(drawerAgentId&&String(drawerAgentId)===String(id))closeTaskDrawer();
    updCnt();
    // Update status bar
    const running=agents.filter(a=>a.runStatus==='running').length;
    if(liveMode)updateLiveStatus(running>0?`LIVE · ${running} running`:'LIVE · Idle');
  },250);
}
async function resetAll(){
  if(liveMode){
    const ids=agents.map(a=>String(a.id));
    for(const id of ids)await removeAgent(id);
    return;
  }
  agents.forEach(a=>stopWeld(a.id));agents=[];nextId=1;slots.forEach(s=>s.u=false);
  selectedAgents.clear();
  document.getElementById('agent-list').innerHTML='';updCnt();closeTaskDrawer();
}

document.addEventListener('keydown',e=>{keys[e.code]=true;});

canvas.addEventListener('mouseenter',()=>{cursorOnCanvas=true;});
canvas.addEventListener('mouseleave',()=>{cursorOnCanvas=false;});

canvas.addEventListener('mousedown',e=>{
  if(!audioUnlocked){audioUnlocked=true;initAudio();}
  mouse.down=true;mouse.px=e.clientX;mouse.py=e.clientY;mouse.button=e.button;
  if(e.button===0){
    const sx=e.clientX;
    const sy=e.clientY-44;
    dragBox={sx,sy,ex:sx,ey:sy,started:false};
  }
  if(e.button===2){
    e.preventDefault();
    e.stopPropagation();
    const wx=e.clientX+cam.x;
    const wy=e.clientY-44+cam.y;
    console.log('[RC] button=2, selected=',selectedAgents.size,'wx=',wx,'wy=',wy);
    let movedAny=false;
    selectedAgents.forEach(id=>{
      const a=agents.find(a=>a.id===id);
      console.log('[RC] agent',id,a?.name,'state=',a?.state,'progress=',a?.progress);
      if(a&&a.commandMove(wx,wy))movedAny=true;
    });
    console.log('[RC] movedAny=',movedAny);
    if(movedAny){
      if(audioUnlocked)playVNow(SCV_VOICES[Math.random()*SCV_VOICES.length|0]);
      moveMarkers.push({x:wx,y:wy,t:0,cycle:MARKER_CYCLES[Math.random()*MARKER_CYCLES.length|0]});
    }
  }
});

canvas.addEventListener('mousemove',e=>{
  mouseScreenX=e.clientX;
  mouseScreenY=e.clientY-44;
  if(mouse.down&&mouse.button===0&&dragBox){
    dragBox.ex=e.clientX;
    dragBox.ey=e.clientY-44;
    const dx=dragBox.ex-dragBox.sx;
    const dy=dragBox.ey-dragBox.sy;
    if(Math.abs(dx)>4||Math.abs(dy)>4)dragBox.started=true;
  }
  // Middle mouse camera pan
  if(mouse.down&&e.buttons===4){
    cam.x-=e.clientX-mouse.px;
    cam.y-=e.clientY-mouse.py;
  }
  mouse.px=e.clientX;mouse.py=e.clientY;
});

canvas.addEventListener('mouseup',e=>{
  if(e.button===0&&dragBox){
    if(dragBox.started){
      // Drag selection complete
      const x1=Math.min(dragBox.sx,dragBox.ex)+cam.x;
      const y1=Math.min(dragBox.sy,dragBox.ey)+cam.y;
      const x2=Math.max(dragBox.sx,dragBox.ex)+cam.x;
      const y2=Math.max(dragBox.sy,dragBox.ey)+cam.y;
      clearSelection();
      agents.forEach(a=>{
        if(a.x>=x1&&a.x<=x2&&a.y>=y1&&a.y<=y2)selectAgent(a);
      });
      syncCardSelection();
      if(selectedAgents.size>0){
        if(audioUnlocked){play('select',.3);playVNow(SCV_VOICES[Math.random()*SCV_VOICES.length|0]);}
      }
    } else {
      // Single left click
      const wx=dragBox.sx+cam.x;
      const wy=dragBox.sy+cam.y;
      const hitAgent=agents.find(a=>a.hit(wx,wy));
      const hitBldgAgent=!hitAgent?agents.find(a=>a.hitBldg(wx,wy)):null;
      clearSelection();
      if(hitAgent){
        selectAgent(hitAgent);
        hitAgent.select();
      } else if(hitBldgAgent){
        selectAgent(hitBldgAgent);
        hitBldgAgent.select();
      }
      syncCardSelection();
    }
    dragBox=null;
  }
  // Right click handled in mousedown for Electron compatibility
  mouse.down=false;mouse.button=-1;
});

let inlineChatAgentId=null;
function openInlineChat(agent,screenX,screenY){
  inlineChatAgentId=String(agent.id);
  const el=document.getElementById('inline-chat');
  const input=document.getElementById('inline-chat-input');
  document.getElementById('inline-chat-name').textContent=agent.displayName||agent.name;
  el.style.left=Math.min(screenX,W-280)+'px';
  el.style.top=Math.min(screenY+20,H-30)+'px';
  el.style.display='block';
  input.value='';
  setTimeout(()=>input.focus(),50);
}
function closeInlineChat(){
  inlineChatAgentId=null;
  document.getElementById('inline-chat').style.display='none';
}
async function sendInlineChatMessage(){
  if(!inlineChatAgentId)return;
  const input=document.getElementById('inline-chat-input');
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  const a=findAgent(inlineChatAgentId);
  if(!a)return;
  if(liveMode&&liveAPI.sendMessage){
    await liveAPI.sendMessage({from:'user',fromName:'You',to:inlineChatAgentId,channel:'radio',kind:'chat',text});
  } else {
    a.chatBubble=text.slice(0,60);a.chatBubbleTimer=4;
  }
}
document.getElementById('inline-chat-send').onclick=sendInlineChatMessage;
document.getElementById('inline-chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendInlineChatMessage();});
document.getElementById('inline-chat-close').onclick=closeInlineChat;

canvas.addEventListener('dblclick',e=>{
  const wx=e.clientX+cam.x;
  const wy=e.clientY-44+cam.y;
  const hitAgent=agents.find(a=>a.hit(wx,wy));
  if(hitAgent){
    openInlineChat(hitAgent,e.clientX,e.clientY-44);
    return;
  }
  const hitBldg=agents.find(a=>a.hitBldg(wx,wy));
  if(hitBldg&&hitBldg.runStatus==='running'){
    if(liveMode&&liveAPI.cancelRun&&hitBldg.runId){
      liveAPI.cancelRun(hitBldg.runId);
      updateLiveStatus(`Emergency stop: ${hitBldg.name}`);
    }
    stopWeld(hitBldg.id);
    hitBldg.chatBubble='⚠ Stopped';hitBldg.chatBubbleTimer=3;
  }
});

function drawMini(){
  const mc=miniCtx,mw=160,mh=100,sx=mw/WORLD_W,sy=mh/WORLD_H;
  if(mapImg&&mapImg.complete&&mapImg.naturalWidth){
    const sc2=Math.max(mw/MAP_IMG_W,mh/MAP_IMG_H);
    const iw=MAP_IMG_W*sc2,ih=MAP_IMG_H*sc2;
    mc.drawImage(mapImg,(mw-iw)/2,(mh-ih)/2,iw,ih);
  } else {
    mc.fillStyle='#243318';mc.fillRect(0,0,mw,mh);
  }
  agents.forEach(a=>{mc.fillStyle=a.progress>=1?'#30d060':'#f0a030';mc.fillRect(a.bx*sx-2,a.by*sy-2,4,3);});
  agents.forEach(a=>{mc.fillStyle='#4a9eff';mc.fillRect(a.x*sx-1,a.y*sy-1,2,2);});
  mc.strokeStyle='rgba(255,255,255,.3)';mc.lineWidth=1;mc.strokeRect(cam.x*sx,cam.y*sy,W*sx,H*sy);
  mc.strokeStyle='#1a3a6a';mc.strokeRect(0,0,mw,mh);
}

// ═══════════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════════
let ff=0,ft2=0,fd=0;
function stepWorld(delta){
  dt=delta;time+=dt;
  ff++;ft2+=dt;if(ft2>=1){fd=ff;ff=0;ft2-=1;document.getElementById('fps-counter').textContent=`${fd} FPS | ${agents.length} agents`;}
  // Camera
  const cs=250*dt;
  if(keys['ArrowLeft']||keys['KeyA'])cam.x-=cs;if(keys['ArrowRight']||keys['KeyD'])cam.x+=cs;
  if(keys['ArrowUp']||keys['KeyW'])cam.y-=cs;if(keys['ArrowDown']||keys['KeyS'])cam.y+=cs;
  cam.x=Math.max(0,Math.min(WORLD_W-W,cam.x));cam.y=Math.max(0,Math.min(WORLD_H-H,cam.y));
  // Update
  agents.forEach(a=>a.update(dt));
  // SCV collision repulsion — agents push each other apart like physical bodies
  for(let i=0;i<agents.length;i++){
    for(let j=i+1;j<agents.length;j++){
      const a=agents[i],b=agents[j];
      const dx=b.x-a.x,dy=b.y-a.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const minDist=32;
      if(dist<minDist&&dist>0.1){
        const nx=dx/dist,ny=dy/dist;
        const push=(minDist-dist)*0.5+150*dt*((minDist-dist)/minDist);
        if(a.state!=='building'){a.x-=nx*push;a.y-=ny*push;}
        if(b.state!=='building'){b.x+=nx*push;b.y+=ny*push;}
      }
    }
  }
  if((time*2|0)!==((time-dt)*2|0))agents.forEach(a=>updateCard(a.id));
}
function renderWorld(){
  // Render
  ctx.clearRect(0,0,W,H);
  if(mapImg&&mapImg.complete&&mapImg.naturalWidth){
    // Cover: fill viewport, maintain aspect ratio
    const sc=Math.max(W/MAP_IMG_W,H/MAP_IMG_H);
    const mw=MAP_IMG_W*sc,mh=MAP_IMG_H*sc;
    ctx.drawImage(mapImg,(W-mw)/2,(H-mh)/2,mw,mh);
  } else {
    ctx.fillStyle='#0a0a1a';
    ctx.fillRect(0,0,W,H);
  }
  // Water ripple animation
  drawWaterRipple();
  // Vespene gas animation overlay
  drawVespeneGas();
  // Unused build slot indicators
  slots.filter(s=>!s.u).forEach(s=>{
    const sx2=s.x-cam.x,sy2=s.y-cam.y;
    ctx.strokeStyle='rgba(64,255,64,.08)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.strokeRect(sx2-40,sy2-30,80,60);ctx.setLineDash([]);
  });
  // Agents sorted by Y
  const sortedAgents=[...agents].sort((a,b)=>a.y-b.y);
  sortedAgents.forEach(a=>a.draw());
  // Chat bubbles rendered last (always on top of everything)
  sortedAgents.forEach(a=>a.drawBubble());
  // SC1 move markers
  updateAndDrawMoveMarkers(dt);
  // SC1 drag selection box
  drawDragBox();
  // Top bar gradient overlay
  ctx.fillStyle='rgba(10,10,26,.85)';ctx.fillRect(0,0,W,2);
  drawMini();
  // SC1 custom cursor (drawn last, on top)
  if(cursorOnCanvas)drawSC1Cursor(mouseScreenX,mouseScreenY);
}
function loop(ts){
  requestAnimationFrame(loop);
  if(!lastT)lastT=ts;
  const frameDt=Math.min((ts-lastT)/1000,.05);
  lastT=ts;
  stepWorld(frameDt);
  renderWorld();
}

// World objects list for perception
function getWorldObjects(){
  const objs=[];
  // Agents/SCVs
  agents.forEach(a=>{
    objs.push({type:'agent',id:a.id,name:a.nickname||a.displayName||a.name,label:a.nickname||a.displayName||a.name,x:a.x,y:a.y,engine:a.engine,status:a.runStatus});
  });
  // Buildings (command centers)
  agents.forEach(a=>{
    if(a.progress>0.01)objs.push({type:'building',id:`bldg-${a.id}`,label:`${a.nickname||a.name}'s CC`,x:a.bx,y:a.by,progress:a.progress});
  });
  // Minerals
  agents.forEach(a=>{
    if(a.mx&&a.my)objs.push({type:'mineral',id:`mineral-${a.id}`,label:'Mineral',x:a.mx,y:a.my});
  });
  // Gas geysers
  GEYSER_POS.forEach((g,i)=>{
    const sc=Math.max(W/MAP_IMG_W,H/MAP_IMG_H);
    const mw=MAP_IMG_W*sc,mh=MAP_IMG_H*sc;
    const ox=(W-mw)/2,oy=(H-mh)/2;
    objs.push({type:'gas',id:`gas-${i}`,label:'Vespene Geyser',x:ox+g.mx*mw,y:oy+g.my*mh});
  });
  return objs;
}
function getAgentPerception(agentId){
  const a=findAgent(agentId);
  if(!a)return null;
  return buildPerception(a,getWorldObjects(),400);
}
window.getAgentPerception=getAgentPerception;
window.getWorldObjects=getWorldObjects;
window.advanceTime=(ms)=>{
  let remaining=Math.max(0,ms)/1000;
  while(remaining>0){
    const step=Math.min(1/60,remaining);
    stepWorld(step);
    remaining-=step;
  }
  renderWorld();
};
